version: '3.8'

services:
  api:
    build: .
    image: api:dev
    container_name: api
    ports:
      - 8002:8002
    # volumes:
    #   # Load documents from /docs directory
    #   - ./docs:/app/docs

  # MongoDB server
  mongodb:
    image: mongo:6.0.1
    container_name: mongodb
    volumes:
      # Pick up the DB from its previous persisted volume state
      - ./data/db:/data/db

